server {
    listen 8080;
    server_name _;

    client_max_body_size 100m;

    location /console/api/ {
        proxy_pass https://dify-api-5tn6.onrender.com/console/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host dify-api-5tn6.onrender.com;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass https://dify-api-5tn6.onrender.com/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host dify-api-5tn6.onrender.com;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /v1/ {
        proxy_pass https://dify-api-5tn6.onrender.com/v1/;
        proxy_ssl_server_name on;
        proxy_set_header Host dify-api-5tn6.onrender.com;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /files/ {
        proxy_pass https://dify-api-5tn6.onrender.com/files/;
        proxy_ssl_server_name on;
        proxy_set_header Host dify-api-5tn6.onrender.com;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass https://dify-web-btio.onrender.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host dify-web-btio.onrender.com;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
